name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Verify CHANGELOG entry
        run: npm run lint:version

      # Verify package.json version matches the git tag
      - name: Verify version match
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${{ github.ref_name }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      # Odd minor (v0.1.x, v0.3.x) → pre-release; even minor (v0.2.x, v1.0.x) → stable
      - name: Detect release type
        id: release_type
        run: |
          MINOR=$(node -p "require('./package.json').version.split('.')[1]")
          if (( MINOR % 2 == 1 )); then
            echo "pre_release=true" >> $GITHUB_OUTPUT
            echo "Publishing PRE-RELEASE (minor=$MINOR)"
          else
            echo "pre_release=false" >> $GITHUB_OUTPUT
            echo "Publishing STABLE (minor=$MINOR)"
          fi

      - name: Package pre-release
        if: steps.release_type.outputs.pre_release == 'true'
        run: npx @vscode/vsce package --pre-release

      - name: Package stable
        if: steps.release_type.outputs.pre_release == 'false'
        run: npx @vscode/vsce package

      - name: Publish pre-release
        if: steps.release_type.outputs.pre_release == 'true'
        run: npx @vscode/vsce publish --packagePath *.vsix --pre-release -p ${{ secrets.VSCE_PAT }}

      - name: Publish stable
        if: steps.release_type.outputs.pre_release == 'false'
        run: npx @vscode/vsce publish --packagePath *.vsix -p ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.release_type.outputs.pre_release == 'true' }}
          generate_release_notes: true
          files: '*.vsix'
